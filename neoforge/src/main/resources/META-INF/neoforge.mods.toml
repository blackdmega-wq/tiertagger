modLoader  = "javafml"
loaderVersion = "[1,)"
license = "MIT"
issueTrackerURL = "https://github.com/blackdmega-wq/tiertagger/issues"

[[mods]]
modId        = "tiertagger"
version      = "${version}"
displayName  = "TierTagger"
displayURL   = "https://outertiers.com"
authors      = "OuterTiers"
description  = '''
Displays OuterTiers tiers next to player names in the tab list.
'''

[[mixins]]
config = "tiertagger.neoforge.mixins.json"

[[dependencies.tiertagger]]
modId        = "neoforge"
type         = "required"
versionRange = "[21.0,)"
ordering     = "NONE"
side         = "CLIENT"

[[dependencies.tiertagger]]
modId        = "minecraft"
type         = "required"
versionRange = "[1.21,)"
ordering     = "NONE"
side         = "CLIENT"
