name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach JARs to (e.g. v1.21.11.1). If empty, JARs are only uploaded as build artifacts.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build Fabric and NeoForge JARs
        run: gradle :fabric:build :neoforge:build -x test --stacktrace

      - name: Collect JARs
        run: |
          mkdir -p out
          # exclude -sources, -dev, -dev-shadow JARs; keep the publishable ones
          find fabric/build/libs neoforge/build/libs -maxdepth 1 -name '*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-dev-shadow.jar' \
            -exec cp -v {} out/ \;
          ls -la out/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiertagger-jars
          path: out/*.jar

      - name: Attach JARs to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
          name: TierTagger ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: out/*.jar
