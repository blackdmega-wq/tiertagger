name: Release jars

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.loader }} ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ───── Fabric (Quilt loads these natively) ─────
          - loader: fabric
            mc: '1.21.1'
            yarn: '1.21.1+build.3'
            loader_version: '0.16.5'
            fabric_api: '0.105.0+1.21.1'
            java: '21'
          - loader: fabric
            mc: '1.21.2'
            yarn: '1.21.2+build.1'
            loader_version: '0.16.7'
            fabric_api: '0.107.0+1.21.2'
            java: '21'
          - loader: fabric
            mc: '1.21.3'
            yarn: '1.21.3+build.2'
            loader_version: '0.16.9'
            fabric_api: '0.110.0+1.21.3'
            java: '21'
          - loader: fabric
            mc: '1.21.4'
            yarn: '1.21.4+build.8'
            loader_version: '0.16.10'
            fabric_api: '0.119.2+1.21.4'
            java: '21'
          # ───── NeoForge ─────
          - loader: neoforge
            mc: '1.21.1'
            neoforge: '21.1.95'
            java: '21'
          - loader: neoforge
            mc: '1.21.4'
            neoforge: '21.4.0-beta'
            java: '21'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Bootstrap wrapper if missing
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.10 --no-daemon; fi
          chmod +x gradlew

      - name: Build Fabric jar
        if: matrix.loader == 'fabric'
        run: |
          ./gradlew :fabric:build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Ploader_version=${{ matrix.loader_version }} \
            -Pfabric_version=${{ matrix.fabric_api }} \
            -Pjava_version=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Build NeoForge jar
        if: matrix.loader == 'neoforge'
        run: |
          ./gradlew :neoforge:build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pneoforge_version=${{ matrix.neoforge }} \
            -Pjava_version=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Collect built jars
        run: |
          mkdir -p staging
          if [ "${{ matrix.loader }}" = "fabric" ]; then
            cp fabric/build/libs/*.jar staging/ || true
          else
            cp neoforge/build/libs/*.jar staging/ || true
          fi
          # Remove Fabric/Loom dev/sources jars; keep only the fat jar
          ls -la staging/
          find staging -type f -name "*-dev.jar"     -delete || true
          find staging -type f -name "*-sources.jar" -delete || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiertagger-${{ matrix.loader }}-${{ matrix.mc }}
          path: staging/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release files
        run: |
          mkdir -p release
          find dist -type f -name "*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
