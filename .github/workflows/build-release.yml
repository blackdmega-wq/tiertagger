name: Build & Release JARs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build Fabric JAR
        run: gradle :fabric:build --no-daemon --stacktrace

      - name: Build NeoForge JAR
        run: gradle :neoforge:build --no-daemon --stacktrace

      - name: Collect JARs
        run: |
          mkdir -p release-jars
          find fabric/build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" -exec cp {} release-jars/ \;
          find neoforge/build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" -exec cp {} release-jars/ \;
          ls -la release-jars/

      - name: Upload JARs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiertagger-jars
          path: release-jars/*.jar

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: TierTagger ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-jars/*.jar
          fail_on_unmatched_files: true
