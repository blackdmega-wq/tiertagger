name: Build & Release JARs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.1.0). Leave blank for a dry-run build with no release upload.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.loader }} · MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ────────────── Fabric ──────────────
          # Loom plugin version is selected per-MC because Loom 1.7 only
          # supports up to MC 1.21.4. Newer MC versions need Loom 1.8+.
          - loader: fabric
            mc: '1.21.1'
            java: 21
            yarn: '1.21.1+build.3'
            fabric_loader: '0.16.5'
            fabric_api: '0.116.11+1.21.1'
            loom: '1.7-SNAPSHOT'
            gradle: '8.10'
          - loader: fabric
            mc: '1.21.2'
            java: 21
            yarn: '1.21.2+build.1'
            fabric_loader: '0.16.7'
            fabric_api: '0.106.1+1.21.2'
            loom: '1.7-SNAPSHOT'
            gradle: '8.10'
          - loader: fabric
            mc: '1.21.3'
            java: 21
            yarn: '1.21.3+build.2'
            fabric_loader: '0.16.9'
            fabric_api: '0.114.1+1.21.3'
            loom: '1.7-SNAPSHOT'
            gradle: '8.10'
          - loader: fabric
            mc: '1.21.4'
            java: 21
            yarn: '1.21.4+build.8'
            fabric_loader: '0.16.10'
            fabric_api: '0.119.4+1.21.4'
            loom: '1.8-SNAPSHOT'
            gradle: '8.10'
          - loader: fabric
            mc: '1.21.5'
            java: 21
            yarn: '1.21.5+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.128.2+1.21.5'
            loom: '1.10-SNAPSHOT'
            gradle: '8.12'
          - loader: fabric
            mc: '1.21.6'
            java: 21
            yarn: '1.21.6+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.128.2+1.21.6'
            loom: '1.10-SNAPSHOT'
            gradle: '8.12'
          - loader: fabric
            mc: '1.21.7'
            java: 21
            yarn: '1.21.7+build.8'
            fabric_loader: '0.16.14'
            fabric_api: '0.129.0+1.21.7'
            loom: '1.10-SNAPSHOT'
            gradle: '8.12'
          - loader: fabric
            mc: '1.21.8'
            java: 21
            yarn: '1.21.8+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.136.1+1.21.8'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          # NOTE: Fabric MC 1.21.9, 1.21.10 and 1.21.11 dropped — vanilla
          # rendering / registry APIs changed and our mixin/screen sources
          # no longer compile unmodified. Needs a per-MC source split.

          # ────────────── NeoForge ──────────────
          - loader: neoforge
            mc: '1.21.1'
            java: 21
            neoforge: '21.1.95'
            moddev: '1.0.24'
            gradle: '8.10'
          - loader: neoforge
            mc: '1.21.3'
            java: 21
            neoforge: '21.3.96'
            moddev: '1.0.24'
            gradle: '8.10'
          - loader: neoforge
            mc: '1.21.4'
            java: 21
            neoforge: '21.4.157'
            moddev: '2.0.78'
            gradle: '8.10'
          - loader: neoforge
            mc: '1.21.5'
            java: 21
            neoforge: '21.5.97'
            moddev: '2.0.78'
            gradle: '8.10'
          - loader: neoforge
            mc: '1.21.8'
            java: 21
            neoforge: '21.8.53'
            moddev: '2.0.141'
            gradle: '8.10'
          # NOTE: NeoForge 1.21.10 and 1.21.11 dropped — the vanilla
          # rendering APIs we mix into changed and the source no longer
          # compiles unmodified. Tracked for a future per-MC source split.

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Pin plugin versions in gradle.properties
        run: |
          # settings.gradle's pluginManagement block reads ${loom_version} /
          # ${moddev_version} as a Groovy GString from gradle.properties.
          # Must run BEFORE setup-gradle/wrapper bootstrap because those also
          # trigger settings evaluation and would fail with the wrong plugin version.
          if [ "${{ matrix.loader }}" = "fabric" ]; then
            sed -i "s|^loom_version=.*|loom_version=${{ matrix.loom }}|" gradle.properties
          else
            sed -i "s|^moddev_version=.*|moddev_version=${{ matrix.moddev }}|" gradle.properties
          fi
          grep -E '^(loom_version|moddev_version)=' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version ${{ matrix.gradle }} --no-daemon
          fi
          chmod +x ./gradlew

      - name: Build Fabric JAR
        if: matrix.loader == 'fabric'
        id: build_fabric
        run: |
          ./gradlew :fabric:build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Ploader_version=${{ matrix.fabric_loader }} \
            -Pfabric_version=${{ matrix.fabric_api }} \
            -Pjava_version=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Build NeoForge JAR
        if: matrix.loader == 'neoforge'
        id: build_neoforge
        run: |
          ./gradlew :neoforge:build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pneoforge_version=${{ matrix.neoforge }} \
            -Pjava_version=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Stage built JARs
        id: stage
        run: |
          mkdir -p staging
          shopt -s nullglob
          if [ "${{ matrix.loader }}" = "fabric" ]; then
            for f in fabric/build/libs/*.jar; do
              case "$f" in *-sources.jar|*-dev.jar) continue;; esac
              base=$(basename "$f" .jar)
              cp "$f" "staging/${base}-mc${{ matrix.mc }}.jar"
            done
          else
            for f in neoforge/build/libs/*.jar; do
              case "$f" in *-sources.jar|*-dev.jar) continue;; esac
              base=$(basename "$f" .jar)
              cp "$f" "staging/${base}-mc${{ matrix.mc }}.jar"
            done
          fi
          ls -la staging/ || true
          if ls staging/*.jar >/dev/null 2>&1; then
            echo "has_jars=true" >> $GITHUB_OUTPUT
          else
            echo "has_jars=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        if: steps.stage.outputs.has_jars == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tiertagger-${{ matrix.loader }}-mc${{ matrix.mc }}
          path: staging/*.jar
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''))
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all JARs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected files
        run: ls -la dist || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: TierTagger ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
