name: Build & Release JARs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.1.0). Leave blank for a dry-run build with no release upload.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.loader }} · MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ────────────── Fabric ──────────────
          # Loom plugin version is selected per-MC because Loom 1.7 only
          # supports up to MC 1.21.4. Newer MC versions need Loom 1.8+.
          - loader: fabric
            mc: '1.21.1'
            java: 21
            yarn: '1.21.1+build.3'
            fabric_loader: '0.16.5'
            fabric_api: '0.116.11+1.21.1'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
            experimental: true
          - loader: fabric
            mc: '1.21.2'
            java: 21
            yarn: '1.21.2+build.1'
            fabric_loader: '0.16.7'
            fabric_api: '0.106.1+1.21.2'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
            experimental: true
          - loader: fabric
            mc: '1.21.3'
            java: 21
            yarn: '1.21.3+build.2'
            fabric_loader: '0.16.9'
            fabric_api: '0.114.1+1.21.3'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
            experimental: true
          - loader: fabric
            mc: '1.21.4'
            java: 21
            yarn: '1.21.4+build.8'
            fabric_loader: '0.16.10'
            fabric_api: '0.119.4+1.21.4'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
            experimental: true
          - loader: fabric
            mc: '1.21.5'
            java: 21
            yarn: '1.21.5+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.128.2+1.21.5'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
            experimental: true
          - loader: fabric
            mc: '1.21.6'
            java: 21
            yarn: '1.21.6+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.128.2+1.21.6'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          - loader: fabric
            mc: '1.21.7'
            java: 21
            yarn: '1.21.7+build.8'
            fabric_loader: '0.16.14'
            fabric_api: '0.129.0+1.21.7'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          - loader: fabric
            mc: '1.21.8'
            java: 21
            yarn: '1.21.8+build.1'
            fabric_loader: '0.16.14'
            fabric_api: '0.136.1+1.21.8'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          - loader: fabric
            mc: '1.21.9'
            java: 21
            yarn: '1.21.9+build.1'
            fabric_loader: '0.16.14'
            # NB: 0.136.1+1.21.9 was never published — 0.134.1 is the
            # actual latest fabric-api for 1.21.9.
            fabric_api: '0.134.1+1.21.9'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          - loader: fabric
            mc: '1.21.10'
            java: 21
            yarn: '1.21.10+build.1'
            fabric_loader: '0.16.14'
            # NB: 0.136.1+1.21.10 was never published — 0.138.4 is the
            # actual latest fabric-api for 1.21.10.
            fabric_api: '0.138.4+1.21.10'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'
          - loader: fabric
            mc: '1.21.11'
            java: 21
            yarn: '1.21.11+build.1'
            fabric_loader: '0.16.14'
            # NB: 0.141.3 trips a Loom unpick-javadoc namespace check
            # ("Javadoc provided by mod (...) must have an intermediary
            # source namespace"). 0.136.1 is the last fabric-api that
            # builds cleanly with the current Loom 1.11-SNAPSHOT.
            fabric_api: '0.136.1+1.21.11'
            loom: '1.11-SNAPSHOT'
            gradle: '8.14'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Pin Loom plugin version in gradle.properties
        run: |
          # settings.gradle's pluginManagement block reads ${loom_version} as a
          # Groovy GString from gradle.properties.  Must run BEFORE
          # setup-gradle/wrapper bootstrap because those also trigger settings
          # evaluation and would fail with the wrong plugin version.
          sed -i "s|^loom_version=.*|loom_version=${{ matrix.loom }}|" gradle.properties
          grep -E '^loom_version=' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version ${{ matrix.gradle }} --no-daemon
          fi
          chmod +x ./gradlew

      - name: Build Fabric JAR
        id: build_fabric
        continue-on-error: ${{ matrix.experimental == true }}
        run: |
          ./gradlew :fabric:build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Ploader_version=${{ matrix.fabric_loader }} \
            -Pfabric_version=${{ matrix.fabric_api }} \
            -Pjava_version=${{ matrix.java }} \
            --no-daemon --stacktrace

      - name: Stage built JARs
        id: stage
        run: |
          mkdir -p staging
          shopt -s nullglob
          for f in fabric/build/libs/*.jar; do
            case "$f" in *-sources.jar|*-dev.jar) continue;; esac
            base=$(basename "$f" .jar)
            cp "$f" "staging/${base}-mc${{ matrix.mc }}.jar"
          done
          ls -la staging/ || true
          if ls staging/*.jar >/dev/null 2>&1; then
            echo "has_jars=true" >> $GITHUB_OUTPUT
          else
            echo "has_jars=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        if: steps.stage.outputs.has_jars == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tiertagger-${{ matrix.loader }}-mc${{ matrix.mc }}
          path: staging/*.jar
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''))
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all JARs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected files
        run: ls -la dist || true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: TierTagger ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mods:
    name: Publish to Modrinth & CurseForge
    needs: release
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success'
    steps:
      - name: Download all JARs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      # ─────────────── Modrinth ───────────────
      # Skips silently if MODRINTH_TOKEN or MODRINTH_PROJECT_ID is not set.
      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          if [ -z "$MODRINTH_TOKEN" ] || [ -z "$MODRINTH_PROJECT_ID" ]; then
            echo "::notice::MODRINTH_TOKEN and/or MODRINTH_PROJECT_ID not set — skipping Modrinth publish."
            exit 0
          fi
          shopt -s nullglob
          jars=(dist/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "::warning::No JARs in dist/ — nothing to publish."
            exit 0
          fi
          VERSION="${TAG#v}"
          CHANGELOG="See https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          for jar in "${jars[@]}"; do
            base=$(basename "$jar" .jar)
            # Filename format: tiertagger-fabric-<modver>-mc<mcver>.jar
            mc=$(echo "$base" | sed -E 's/.*-mc([0-9]+\.[0-9]+(\.[0-9]+)?)$/\1/')
            if [ -z "$mc" ]; then
              echo "::warning::Could not parse mc from $base — skipping."
              continue
            fi
            ver_num="${VERSION}+fabric-mc${mc}"
            echo ">>> Modrinth upload: $base  (mc=$mc  version=$ver_num)"
            data=$(jq -nc \
              --arg name        "TierTagger $VERSION (fabric $mc)" \
              --arg version_num "$ver_num" \
              --arg changelog   "$CHANGELOG" \
              --arg project_id  "$MODRINTH_PROJECT_ID" \
              --arg mc          "$mc" \
              --arg fname       "$base.jar" \
              '{
                name:           $name,
                version_number: $version_num,
                changelog:      $changelog,
                dependencies:   [],
                game_versions:  [$mc],
                version_type:   "release",
                loaders:        ["fabric"],
                featured:       false,
                project_id:     $project_id,
                file_parts:     [$fname],
                primary_file:   $fname
              }')
            http_code=$(curl -sS -o /tmp/mr_resp.json -w "%{http_code}" \
              -X POST "https://api.modrinth.com/v2/version" \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -F "data=${data};type=application/json" \
              -F "${base}.jar=@${jar};type=application/java-archive")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "    ✓ uploaded ($http_code)"
            elif [ "$http_code" = "400" ] && grep -q "duplicate" /tmp/mr_resp.json 2>/dev/null; then
              echo "    ⏭ already exists, skipped"
            else
              echo "::warning::Modrinth upload failed for $base ($http_code): $(cat /tmp/mr_resp.json)"
            fi
          done

      # ─────────────── CurseForge ───────────────
      - name: Publish to CurseForge
        env:
          CURSEFORGE_TOKEN:     ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          if [ -z "$CURSEFORGE_TOKEN" ] || [ -z "$CURSEFORGE_PROJECT_ID" ]; then
            echo "::notice::CURSEFORGE_TOKEN and/or CURSEFORGE_PROJECT_ID not set — skipping CurseForge publish."
            exit 0
          fi
          shopt -s nullglob
          jars=(dist/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "::warning::No JARs in dist/ — nothing to publish."
            exit 0
          fi
          curl -sS -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
            "https://minecraft.curseforge.com/api/game/versions" > /tmp/cf_versions.json
          if ! jq -e '.[0].id' /tmp/cf_versions.json >/dev/null 2>&1; then
            echo "::error::Could not load CurseForge game-version table. Check CURSEFORGE_TOKEN."
            cat /tmp/cf_versions.json | head -5
            exit 1
          fi
          VERSION="${TAG#v}"
          CHANGELOG="See https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          for jar in "${jars[@]}"; do
            base=$(basename "$jar" .jar)
            mc=$(echo "$base" | sed -E 's/.*-mc([0-9]+\.[0-9]+(\.[0-9]+)?)$/\1/')
            if [ -z "$mc" ]; then
              echo "::warning::Could not parse mc from $base — skipping."
              continue
            fi
            mc_id=$(jq --arg n "$mc" '.[] | select(.name == $n) | .id' /tmp/cf_versions.json | head -1)
            loader_id=$(jq --arg n "Fabric" '.[] | select(.name == $n) | .id' /tmp/cf_versions.json | head -1)
            java_id=$(jq '.[] | select(.name == "Java 21") | .id' /tmp/cf_versions.json | head -1)
            ids=$(jq -nc --argjson a "${mc_id:-0}" --argjson b "${loader_id:-0}" --argjson c "${java_id:-0}" \
                  '[$a, $b, $c] | map(select(. != 0))')
            if [ "$ids" = "[]" ]; then
              echo "::warning::No CurseForge IDs resolved for $base (mc=$mc) — skipping."
              continue
            fi
            echo ">>> CurseForge upload: $base  (gameVersions=$ids)"
            metadata=$(jq -nc \
              --arg changelog "$CHANGELOG" \
              --arg display   "TierTagger $VERSION (fabric $mc)" \
              --argjson ids   "$ids" \
              '{
                changelog:        $changelog,
                changelogType:    "markdown",
                displayName:      $display,
                gameVersions:     $ids,
                releaseType:      "release"
              }')
            http_code=$(curl -sS -o /tmp/cf_resp.json -w "%{http_code}" \
              -X POST "https://minecraft.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file" \
              -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
              -F "metadata=${metadata}" \
              -F "file=@${jar};type=application/java-archive")
            if [ "$http_code" = "200" ]; then
              echo "    ✓ uploaded ($http_code)"
            else
              echo "::warning::CurseForge upload failed for $base ($http_code): $(cat /tmp/cf_resp.json)"
            fi
          done
